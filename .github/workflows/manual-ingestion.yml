name: Manual AI Ingestion

on:
  # This workflow runs only when manually triggered from GitHub Actions.
  # It does not run on a schedule.
  # After you commit and push this file to GitHub, it will appear in the Actions tab.
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run ingestion script
        run: PYTHONPATH=. python backend/ingest_anthropic.py
        env:
          # These required secrets are expected to already exist in the repository settings.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}